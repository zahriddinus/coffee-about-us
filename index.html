<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- HEADER -->

    <header class="header">
      <div class="container">
        <div class="header-wrapper">
          <a class="header__logo" href="#">
            <img
              src="./images/header-logo.svg"
              alt="A main logo of site"
              width="236"
              height="26"
            />
          </a>

          <nav class="sitenav">
            <ul class="sitenav__list">
              <li class="sitenav__item">
                <a class="sitenav__link" href="#">Home</a>
              </li>
              <li class="sitenav__item">
                <a class="sitenav__link" href="#">About us</a>
              </li>
              <li class="sitenav__item">
                <a class="sitenav__link" href="#">Create your plan</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <!-- MAIN -->

    <main>
      <!-- Hero -->
      <div>
        <div class="container">
          <div class="hero">
            <div class="hero__content-wrapper">
              <h1 class="hero__heading">About Us</h1>
              <p class="hero__desc">
                Coffeeroasters began its journey of exotic discovery in 1999,
                highlighting stories of coffee from around the world. We have
                since been dedicated to bring the perfect cup - from bean to
                brew - in every shipment.
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
